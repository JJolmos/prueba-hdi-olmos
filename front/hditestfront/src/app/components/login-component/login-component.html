<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Iniciar Sesión</mat-card-title>
    </mat-card-header>
    
    <mat-card-content>
      <form (ngSubmit)="onLogin()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Usuario</mat-label>
          <input matInput name="correo" [(ngModel)]="loginData.correo" required>
          <mat-icon matSuffix>person</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput type="password" name="contrasena" [(ngModel)]="loginData.contrasena" required>
          <mat-icon matSuffix>lock</mat-icon>
        </mat-form-field>
        
        <button mat-raised-button color="primary" class="full-width" type="submit">
          Log In
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
